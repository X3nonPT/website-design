<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <linearGradient id="soled" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glo1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glo2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#4169e1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#sbg)"/>
  <!-- TV frame -->
  <rect x="15" y="40" width="270" height="170" rx="6" fill="#111" stroke="#222" stroke-width="2"/>
  <!-- OLED screen -->
  <rect x="22" y="47" width="256" height="156" rx="3" fill="url(#soled)"/>
  <!-- OLED content: cinematic scene -->
  <rect x="22" y="47" width="256" height="156" rx="3" fill="url(#glo1)"/>
  <rect x="22" y="47" width="256" height="156" rx="3" fill="url(#glo2)"/>
  <!-- Horizon line -->
  <rect x="22" y="125" width="256" height="78" rx="0" fill="rgba(0,0,0,0.4)"/>
  <!-- City silhouette -->
  <rect x="30" y="110" width="12" height="40" fill="rgba(0,0,0,0.7)"/>
  <rect x="46" y="100" width="8" height="50" fill="rgba(0,0,0,0.7)"/>
  <rect x="58" y="115" width="15" height="35" fill="rgba(0,0,0,0.7)"/>
  <rect x="77" y="108" width="10" height="42" fill="rgba(0,0,0,0.7)"/>
  <rect x="240" y="112" width="12" height="38" fill="rgba(0,0,0,0.7)"/>
  <rect x="256" y="105" width="8" height="45" fill="rgba(0,0,0,0.7)"/>
  <!-- Perfect black OLED text hint -->
  <text x="148" y="175" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="rgba(255,255,255,0.3)" letter-spacing="3">OLED · 4K · 120Hz</text>
  <!-- Sony logo -->
  <text x="148" y="195" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#888" letter-spacing="3">SONY</text>
  <!-- Stand -->
  <rect x="110" y="212" width="80" height="8" rx="2" fill="#111"/>
  <rect x="125" y="220" width="50" height="5" rx="2" fill="#1a1a1a"/>
  <ellipse cx="150" cy="235" rx="60" ry="8" fill="#1a1a1a"/>
  <ellipse cx="150" cy="233" rx="58" ry="6" fill="#222"/>
</svg>