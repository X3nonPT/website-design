<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="iti" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="40%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="isc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#ibg)"/>
  <!-- Phone body titanium -->
  <rect x="95" y="30" width="110" height="240" rx="22" fill="url(#iti)"/>
  <!-- Side highlight -->
  <rect x="95" y="30" width="5" height="240" rx="3" fill="rgba(255,255,255,0.12)"/>
  <!-- Screen -->
  <rect x="102" y="42" width="96" height="216" rx="16" fill="url(#isc)"/>
  <!-- Dynamic Island -->
  <rect x="126" y="52" width="48" height="14" rx="7" fill="#000"/>
  <!-- Camera inside dynamic island -->
  <circle cx="162" cy="59" r="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <circle cx="162" cy="59" r="2" fill="#0a0a0a"/>
  <!-- Screen content: iOS style -->
  <rect x="108" y="75" width="84" height="84" rx="12" fill="rgba(255,255,255,0.06)"/>
  <!-- App icons grid suggestion -->
  <rect x="112" y="79" width="18" height="18" rx="5" fill="rgba(0,122,255,0.7)"/>
  <rect x="134" y="79" width="18" height="18" rx="5" fill="rgba(52,199,89,0.7)"/>
  <rect x="156" y="79" width="18" height="18" rx="5" fill="rgba(255,149,0,0.7)"/>
  <rect x="178" y="79" width="18" height="18" rx="5" fill="rgba(255,59,48,0.7)"/>
  <rect x="112" y="101" width="18" height="18" rx="5" fill="rgba(175,82,222,0.7)"/>
  <rect x="134" y="101" width="18" height="18" rx="5" fill="rgba(255,204,0,0.7)"/>
  <rect x="156" y="101" width="18" height="18" rx="5" fill="rgba(90,200,250,0.7)"/>
  <rect x="178" y="101" width="18" height="18" rx="5" fill="rgba(255,255,255,0.2)"/>
  <!-- Time on screen -->
  <text x="150" y="185" text-anchor="middle" font-family="Arial" font-size="28" font-weight="300" fill="white" opacity="0.9">9:41</text>
  <text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.6)">Wednesday, April 29</text>
  <!-- Action button -->
  <rect x="94" y="90" width="4" height="28" rx="2" fill="#555"/>
  <!-- Volume buttons -->
  <rect x="94" y="130" width="4" height="20" rx="2" fill="#555"/>
  <rect x="94" y="156" width="4" height="20" rx="2" fill="#555"/>
  <!-- Power button -->
  <rect x="202" y="120" width="4" height="30" rx="2" fill="#555"/>
  <!-- Camera module back (visible hint) -->
  <rect x="105" y="250" width="86" height="3" rx="1" fill="rgba(255,255,255,0.05)"/>
  <!-- Home indicator -->
  <rect x="132" y="248" width="36" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>