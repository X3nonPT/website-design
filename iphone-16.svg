<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="i16bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="i16body" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7fc1"/>
      <stop offset="50%" style="stop-color:#2e5fa0"/>
      <stop offset="100%" style="stop-color:#1a3f7a"/>
    </linearGradient>
    <linearGradient id="i16sc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#i16bg)"/>
  <!-- iPhone 16 body (Ultramarine Blue) -->
  <rect x="97" y="28" width="106" height="244" rx="20" fill="url(#i16body)"/>
  <!-- Side highlight -->
  <rect x="97" y="28" width="4" height="244" rx="3" fill="rgba(255,255,255,0.1)"/>
  <!-- Screen -->
  <rect x="103" y="40" width="94" height="220" rx="15" fill="#0e0e0e"/>
  <rect x="105" y="42" width="90" height="216" rx="13" fill="url(#i16sc)"/>
  <!-- Dynamic Island -->
  <rect x="130" y="50" width="40" height="13" rx="6.5" fill="#000"/>
  <circle cx="160" cy="56.5" r="3.5" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Wallpaper -->
  <defs>
    <radialGradient id="i16wall" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#000510"/>
    </radialGradient>
  </defs>
  <rect x="105" y="42" width="90" height="216" rx="13" fill="url(#i16wall)"/>
  <!-- Stars/points on wallpaper -->
  <circle cx="120" cy="90" r="1" fill="rgba(255,255,255,0.6)"/>
  <circle cx="175" cy="80" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="140" cy="110" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="185" cy="120" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="115" cy="140" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <!-- Clock on screen -->
  <text x="150" y="175" text-anchor="middle" font-family="Arial" font-size="30" font-weight="200" fill="white" opacity="0.9">9:41</text>
  <text x="150" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">Wednesday, April 29</text>
  <!-- Camera module (iPhone 16 square with capture button) -->
  <rect x="108" y="48" width="26" height="26" rx="8" fill="rgba(0,0,0,0.3)"/>
  <circle cx="116" cy="59" r="6" fill="#111" stroke="#222" stroke-width="1"/>
  <circle cx="116" cy="59" r="3.5" fill="#0a0a0a"/>
  <circle cx="126" cy="59" r="6" fill="#111" stroke="#222" stroke-width="1"/>
  <circle cx="126" cy="59" r="3.5" fill="#0a0a0a"/>
  <!-- Action button -->
  <rect x="96" y="88" width="3" height="22" rx="1.5" fill="rgba(255,255,255,0.2)"/>
  <!-- Volume buttons -->
  <rect x="96" y="124" width="3" height="18" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  <rect x="96" y="146" width="3" height="18" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Power -->
  <rect x="201" y="118" width="3" height="28" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Home bar -->
  <rect x="133" y="248" width="34" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="150" cy="282" rx="44" ry="5" fill="rgba(0,0,0,0.07)"/>
</svg>