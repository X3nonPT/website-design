<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="p16bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#ebebeb"/>
    </linearGradient>
    <linearGradient id="p16body" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#181818"/>
    </linearGradient>
    <radialGradient id="p16wall" cx="50%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#0066cc"/>
      <stop offset="40%" style="stop-color:#003380"/>
      <stop offset="100%" style="stop-color:#000a1a"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#p16bg)"/>
  <!-- MacBook Pro 16 lid (bigger) -->
  <rect x="20" y="52" width="260" height="168" rx="10" fill="url(#p16body)"/>
  <!-- Screen bezel -->
  <rect x="27" y="58" width="246" height="154" rx="7" fill="#0e0e0e"/>
  <!-- Screen -->
  <rect x="30" y="61" width="240" height="148" rx="5" fill="#000"/>
  <rect x="30" y="61" width="240" height="148" rx="5" fill="url(#p16wall)" opacity="0.95"/>
  <!-- Notch -->
  <rect x="135" y="61" width="30" height="14" rx="0" fill="#0e0e0e"/>
  <rect x="135" y="61" width="30" height="7" rx="3" fill="#080808"/>
  <!-- macOS UI elements suggestion -->
  <rect x="30" y="61" width="240" height="16" rx="0" fill="rgba(0,0,0,0.3)"/>
  <!-- Traffic lights -->
  <circle cx="44" cy="69" r="4" fill="rgba(255,95,86,0.8)"/>
  <circle cx="56" cy="69" r="4" fill="rgba(255,189,46,0.8)"/>
  <circle cx="68" cy="69" r="4" fill="rgba(39,201,63,0.8)"/>
  <!-- Pro badge text -->
  <text x="150" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="2">MacBook Pro 16"</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.2)" letter-spacing="1">M4 MAX · 48GB</text>
  <!-- Base -->
  <rect x="14" y="220" width="272" height="34" rx="4" fill="url(#p16body)"/>
  <rect x="20" y="223" width="260" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="20" y="231" width="260" height="7" rx="2" fill="rgba(255,255,255,0.05)"/>
  <rect x="20" y="240" width="260" height="7" rx="2" fill="rgba(255,255,255,0.04)"/>
  <!-- Trackpad -->
  <rect x="112" y="225" width="76" height="22" rx="4" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="150" cy="264" rx="105" ry="8" fill="rgba(0,0,0,0.09)"/>
</svg>