<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="iabg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="iabody" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:#a8c7e8"/>
      <stop offset="100%" style="stop-color:#7aabda"/>
    </linearGradient>
    <linearGradient id="iasc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#iabg)"/>
  <!-- iPad Air body (Sky Blue) - slightly smaller than Pro -->
  <rect x="82" y="30" width="136" height="240" rx="14" fill="url(#iabody)"/>
  <!-- Screen bezel -->
  <rect x="89" y="46" width="122" height="208" rx="8" fill="#0e0e0e"/>
  <!-- Screen -->
  <rect x="91" y="48" width="118" height="204" rx="6" fill="url(#iasc)"/>
  <!-- iPadOS wallpaper - blue/teal -->
  <defs>
    <radialGradient id="iawall" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#48b2e8"/>
      <stop offset="50%" style="stop-color:#1e6fa5"/>
      <stop offset="100%" style="stop-color:#0a2a4a"/>
    </radialGradient>
  </defs>
  <rect x="91" y="48" width="118" height="204" rx="6" fill="url(#iawall)"/>
  <!-- Top bar with camera -->
  <rect x="91" y="48" width="118" height="16" rx="0" fill="rgba(0,0,0,0.2)"/>
  <circle cx="150" cy="56" r="4" fill="#000" opacity="0.5"/>
  <!-- App grid -->
  <rect x="97" y="72" width="20" height="20" rx="5" fill="rgba(255,255,255,0.15)"/>
  <rect x="121" y="72" width="20" height="20" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="145" y="72" width="20" height="20" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="169" y="72" width="20" height="20" rx="5" fill="rgba(255,255,255,0.12)"/>
  <rect x="97" y="96" width="20" height="20" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="121" y="96" width="20" height="20" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="145" y="96" width="20" height="20" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="169" y="96" width="20" height="20" rx="5" fill="rgba(255,255,255,0.1)"/>
  <text x="150" y="170" text-anchor="middle" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)">iPad Air 11"</text>
  <text x="150" y="182" text-anchor="middle" font-family="Arial" font-size="7.5" fill="rgba(255,255,255,0.25)">M3 · Azul-céu</text>
  <!-- Home bar -->
  <rect x="128" y="242" width="44" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <!-- Top button (Touch ID) -->
  <rect x="218" y="60" width="4" height="18" rx="2" fill="#8ab8d8"/>
  <!-- Volume buttons -->
  <rect x="218" y="92" width="4" height="16" rx="2" fill="#8ab8d8"/>
  <rect x="218" y="112" width="4" height="16" rx="2" fill="#8ab8d8"/>
  <ellipse cx="150" cy="280" rx="48" ry="5" fill="rgba(0,0,0,0.06)"/>
</svg>