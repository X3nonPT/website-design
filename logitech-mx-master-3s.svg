<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="mbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#ebebeb"/>
    </linearGradient>
    <linearGradient id="mouse" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="60%" style="stop-color:#222"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <linearGradient id="mside" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6dff"/>
      <stop offset="100%" style="stop-color:#0052cc"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#mbg)"/>
  <!-- Mouse body -->
  <ellipse cx="150" cy="165" rx="62" ry="88" fill="url(#mouse)"/>
  <ellipse cx="150" cy="165" rx="60" ry="86" fill="#2a2a2a"/>
  <!-- Mouse top surface -->
  <ellipse cx="150" cy="120" rx="52" ry="38" fill="#1e1e1e"/>
  <!-- Left click -->
  <path d="M100 110 Q120 80 150 78 L150 122 Q125 122 100 118 Z" fill="#252525" stroke="#333" stroke-width="0.5"/>
  <!-- Right click -->
  <path d="M200 110 Q180 80 150 78 L150 122 Q175 122 200 118 Z" fill="#1e1e1e" stroke="#333" stroke-width="0.5"/>
  <!-- Scroll wheel -->
  <ellipse cx="150" cy="100" rx="10" ry="14" fill="#444"/>
  <rect x="140" y="86" width="20" height="28" rx="10" fill="#3a3a3a"/>
  <!-- Scroll wheel lines -->
  <line x1="142" y1="95" x2="158" y2="95" stroke="#555" stroke-width="1"/>
  <line x1="142" y1="100" x2="158" y2="100" stroke="#555" stroke-width="1"/>
  <line x1="142" y1="105" x2="158" y2="105" stroke="#555" stroke-width="1"/>
  <!-- Side button (blue Logitech accent) -->
  <rect x="90" y="140" width="18" height="10" rx="3" fill="url(#mside)"/>
  <rect x="90" y="155" width="18" height="10" rx="3" fill="#0052cc"/>
  <!-- Thumb rest -->
  <path d="M88 170 Q80 190 88 215 Q98 220 108 210 Q106 185 100 170 Z" fill="#222"/>
  <!-- Logitech logo area -->
  <circle cx="150" cy="185" r="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Bottom indicator light -->
  <ellipse cx="150" cy="240" rx="6" ry="3" fill="rgba(26,109,255,0.6)"/>
  <!-- Shadow -->
  <ellipse cx="150" cy="262" rx="58" ry="10" fill="rgba(0,0,0,0.12)"/>
</svg>