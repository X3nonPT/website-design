<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>
  <!-- Monitor body -->
  <rect x="30" y="40" width="240" height="155" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <!-- Screen bezel inner -->
  <rect x="38" y="48" width="224" height="139" rx="4" fill="url(#screen)"/>
  <!-- Gaming RGB effect on screen -->
  <rect x="38" y="48" width="224" height="139" rx="4" fill="url(#glow)" opacity="0.3"/>
  <!-- Curved screen indicator -->
  <path d="M38 117 Q150 110 262 117" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Screen content: abstract gaming visual -->
  <polygon points="110,90 165,75 195,110 180,145 120,145 95,115" fill="rgba(0,212,255,0.15)" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>
  <polygon points="130,100 160,88 178,112 165,135 125,135 108,112" fill="rgba(123,47,255,0.2)" stroke="rgba(123,47,255,0.5)" stroke-width="1"/>
  <line x1="60" y1="160" x2="240" y2="160" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <!-- Samsung logo area -->
  <text x="150" y="177" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#aaa" letter-spacing="2">SAMSUNG</text>
  <!-- Stand neck -->
  <rect x="140" y="195" width="20" height="30" rx="3" fill="#2a2a2a"/>
  <!-- Stand base -->
  <ellipse cx="150" cy="232" rx="55" ry="10" fill="#222"/>
  <ellipse cx="150" cy="230" rx="52" ry="8" fill="#333"/>
  <!-- RGB strip bottom of monitor -->
  <rect x="30" y="190" width="240" height="4" rx="2" fill="none" stroke="rgba(0,212,255,0.6)" stroke-width="1"/>
  <rect x="30" y="190" width="80" height="4" rx="0" fill="rgba(0,212,255,0.7)"/>
  <rect x="110" y="190" width="80" height="4" rx="0" fill="rgba(123,47,255,0.7)"/>
  <rect x="190" y="190" width="80" height="4" rx="0" fill="rgba(255,50,100,0.7)"/>
</svg>